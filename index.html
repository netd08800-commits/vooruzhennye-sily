<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Военная Академия</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; margin: 0; }
        .container { max-width: 400px; margin: 50px auto; background: white; padding: 25px; border-radius: 10px; }
        h1 { text-align: center; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin: 10px 0; background: #0066cc; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #0052a3; }
        .alert { padding: 10px; margin: 10px 0; border-radius: 6px; text-align: center; }
        .error { background: #ffe0e0; color: #c00; }
        .success { background: #e0ffe0; color: #090; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎖️ ВОЕННАЯ АКАДЕМИЯ</h1>
        
        <div id="guestView">
            <button onclick="showRegister()">📝 Регистрация</button>
            <button onclick="showLogin()" style="background:#666">🔐 Вход</button>
        </div>

        <div id="registerView" class="hidden">
            <input type="text" id="regUsername" placeholder="Имя пользователя">
            <input type="password" id="regPass" placeholder="Пароль">
            <input type="password" id="regPass2" placeholder="Повторите пароль">
            <button onclick="doRegister()">Создать аккаунт</button>
            <button onclick="showGuest()" style="background:#999">Назад</button>
            <div id="regMsg"></div>
        </div>

        <div id="loginView" class="hidden">
            <input type="text" id="loginUsername" placeholder="Имя пользователя">
            <input type="password" id="loginPass" placeholder="Пароль">
            <button onclick="doLogin()">Войти</button>
            <button onclick="showGuest()" style="background:#999">Назад</button>
            <div id="loginMsg"></div>
        </div>

        <div id="userView" class="hidden">
            <p style="text-align:center">Привет, <strong id="userName"></strong>!</p>
            <p style="text-align:center; color:#666; font-size:14px;">Роль: <span id="userRole"></span></p>
            <button onclick="doLogout()">🚪 Выйти</button>
        </div>
    </div>

    <script>
        // Supabase client
        var sb = window.supabase.createClient(
            'https://innljjhvmyzgfqhenmjq.supabase.co',
            'sb_publishable_ViVCLNkbxhKos0sVCWlcOA_eZQEDDO3'
        );

        var currentUser = null;

        function showGuest() { 
            hideAll(); 
            document.getElementById('guestView').classList.remove('hidden'); 
        }
        function showRegister() { 
            hideAll(); 
            document.getElementById('registerView').classList.remove('hidden'); 
        }
        function showLogin() { 
            hideAll(); 
            document.getElementById('loginView').classList.remove('hidden'); 
        }
        function showUser() { 
            hideAll(); 
            document.getElementById('userName').textContent = currentUser.username;
            document.getElementById('userRole').textContent = currentUser.role;
            document.getElementById('userView').classList.remove('hidden'); 
        }
        function hideAll() { 
            ['guestView','registerView','loginView','userView'].forEach(function(id) { 
                document.getElementById(id).classList.add('hidden'); 
            }); 
        }

        function msg(id, text, type) { 
            document.getElementById(id).innerHTML = '<div class="alert ' + type + '">' + text + '</div>'; 
        }

        // РЕГИСТРАЦИЯ — БЕЗ EMAIL!
        async function doRegister() {
            var username = document.getElementById('regUsername').value.trim();
            var p1 = document.getElementById('regPass').value;
            var p2 = document.getElementById('regPass2').value;
            
            if (!username) return msg('regMsg', 'Введите имя пользователя', 'error');
            if (username.length < 3) return msg('regMsg', 'Минимум 3 символа', 'error');
            if (!p1) return msg('regMsg', 'Введите пароль', 'error');
            if (p1 !== p2) return msg('regMsg', 'Пароли не совпадают', 'error');
            if (p1.length < 6) return msg('regMsg', 'Пароль минимум 6 символов', 'error');

            // Проверяем, есть ли уже такой пользователь
            var check = await sb.from('users').select('id').eq('username', username).single();
            if (check.data) return msg('regMsg', 'Пользователь уже существует', 'error');

            // Создаём пользователя в таблице users
            var newUser = {
                id: 'user_' + Date.now(),
                username: username,
                password: p1,
                role: 'Гражданский'
            };

            var res = await sb.from('users').insert([newUser]);
            if (res.error) return msg('regMsg', 'Ошибка: ' + res.error.message, 'error');

            msg('regMsg', '✅ Готово! Войдите.', 'success');
            setTimeout(showLogin, 1500);
        }

        // ВХОД — БЕЗ EMAIL!
        async function doLogin() {
            var username = document.getElementById('loginUsername').value.trim();
            var pass = document.getElementById('loginPass').value;
            
            if (!username) return msg('loginMsg', 'Введите имя пользователя', 'error');
            if (!pass) return msg('loginMsg', 'Введите пароль', 'error');

            // Ищем пользователя по username и password
            var res = await sb.from('users').select('*').eq('username', username).eq('password', pass).single();
            
            if (res.error || !res.data) return msg('loginMsg', 'Неверное имя пользователя или пароль', 'error');

            currentUser = res.data;
            showUser();
        }

        function doLogout() { 
            currentUser = null; 
            showGuest(); 
        }

        // Проверяем, не залогинен ли уже
        window.addEventListener('DOMContentLoaded', function() {
            var saved = localStorage.getItem('mil_user');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    showUser();
                } catch(e) { 
                    localStorage.removeItem('mil_user'); 
                }
            }
        });

        // Сохраняем сессию
        var origShowUser = showUser;
        showUser = function() {
            origShowUser();
            if (currentUser) {
                localStorage.setItem('mil_user', JSON.stringify(currentUser));
            }
        };

        var origDoLogout = doLogout;
        doLogout = function() {
            localStorage.removeItem('mil_user');
            origDoLogout();
        };
    </script>
</body>
</html>
