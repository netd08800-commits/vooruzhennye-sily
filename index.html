<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Министерство обороны</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1f2b;font-family:Arial,sans-serif;color:#e0e0e0;}
.auth-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:9999;}
.auth-card{background:#1e2b1c;border:2px solid #8b7d3c;border-radius:8px;padding:30px;max-width:400px;width:90%;}
.auth-card h2{color:#d4af37;text-align:center;margin-bottom:20px;}
.auth-form input{width:100%;padding:12px;margin:8px 0;background:#1a2818;border:1px solid #2a3a28;color:#fff;border-radius:4px;}
.auth-form .btn{width:100%;padding:12px;margin-top:10px;background:#2a5a28;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px;font-weight:600;}
.auth-error{background:#3a1a1a;color:#d88a8a;padding:10px;margin:10px 0;border-radius:4px;display:none;text-align:center;}
.mil-header{background:#2c3e2a;border-bottom:3px solid #8b7d3c;padding:15px 30px;}
.mil-header h1{color:#fff;font-size:20px;}
.mil-content{max-width:1200px;margin:auto;padding:30px;}
.welcome{background:#1e2b1c;border-left:4px solid #d4af37;padding:20px;margin:20px 0;border-radius:4px;}
.btn-logout{background:#3a1a1a;color:#fff;padding:8px 16px;border:none;border-radius:4px;cursor:pointer;margin-top:15px;}
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h2>🔐 ДОСТУП К СИСТЕМЕ</h2>
    <div id="authError" class="auth-error"></div>
    <form class="auth-form" id="loginForm">
      <input type="text" id="loginUsername" placeholder="Имя пользователя" required>
      <input type="password" id="loginPassword" placeholder="Пароль" required>
      <button type="submit" class="btn">Войти</button>
    </form>
  </div>
</div>

<div class="mil-header">
  <h1>Министерство обороны — Региональная Федерация</h1>
</div>

<div class="mil-content">
  <div class="welcome">
    <h2>✅ Вход выполнен!</h2>
    <p id="userInfo"></p>
    <button class="btn-logout" onclick="logout()">Выйти</button>
  </div>
</div>

<script>
var ADMIN_USER = 'Швец О.В.';
var ADMIN_PASS = 'Google200720';
var currentUser = null;

document.addEventListener('DOMContentLoaded', function(){
  console.log('Страница загружена');
  
  var saved = localStorage.getItem('mil_user');
  if(saved){
    try {
      currentUser = JSON.parse(saved);
      showMain();
    } catch(e){
      localStorage.removeItem('mil_user');
    }
  }
  
  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    var user = document.getElementById('loginUsername').value.trim();
    var pass = document.getElementById('loginPassword').value;
    
    console.log('Вход:', user);
    
    if(user === ADMIN_USER && pass === ADMIN_PASS){
      currentUser = {name: user, role: 'Модер'};
      localStorage.setItem('mil_user', JSON.stringify(currentUser));
      showMain();
    } else {
      var err = document.getElementById('authError');
      err.textContent = 'Неверный логин или пароль';
      err.style.display = 'block';
    }
  });
});

function showMain(){
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('userInfo').innerHTML = 
    '<b>Пользователь:</b> ' + currentUser.name + '<br>' +
    '<b>Роль:</b> ' + currentUser.role;
}

function logout(){
  localStorage.removeItem('mil_user');
  location.reload();
}
</script>

</body>
</html>
