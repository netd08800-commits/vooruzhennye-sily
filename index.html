<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Министерство обороны</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a1f2b;font-family:Arial,sans-serif;color:#e0e0e0;}
.auth-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:9999;}
.auth-card{background:#1e2b1c;border:2px solid #8b7d3c;border-radius:8px;padding:30px;max-width:400px;width:90%;}
.auth-card h2{color:#d4af37;text-align:center;margin-bottom:20px;}
.auth-form input{width:100%;padding:10px;margin-bottom:10px;background:#1a2818;border:1px solid #2a3a28;color:#fff;border-radius:4px;}
.auth-form .btn{width:100%;padding:12px;background:#2a5a28;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:14px;}
.auth-error{background:#3a1a1a;color:#d88a8a;padding:10px;margin-bottom:10px;border-radius:4px;display:none;}
.hidden{display:none!important;}
.mil-header{background:#2c3e2a;border-bottom:3px solid #8b7d3c;padding:15px 30px;}
.mil-header h1{color:#fff;font-size:20px;}
.mil-nav{background:#0f1a0d;padding:10px 30px;}
.mil-nav button{background:transparent;border:none;color:#7a8a6e;padding:10px 20px;cursor:pointer;font-size:13px;}
.mil-nav button.active{color:#d4af37;}
.mil-content{max-width:1200px;margin:auto;padding:30px;}
.section{display:none;}
.section.active{display:block;}
.welcome{background:#1e2b1c;border-left:4px solid #d4af37;padding:20px;margin-bottom:20px;}
.btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;}
.btn-create{background:#2a5a28;color:#fff;}
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <h2>🔐 ДОСТУП К СИСТЕМЕ</h2>
    <div id="authError" class="auth-error"></div>
    <form class="auth-form" id="loginForm">
      <input type="text" id="loginUsername" placeholder="Имя пользователя" required>
      <input type="password" id="loginPassword" placeholder="Пароль" required>
      <button type="submit" class="btn">Войти</button>
    </form>
  </div>
</div>

<div class="mil-header"><h1>Министерство обороны — Региональная Федерация</h1></div>
<div class="mil-nav">
  <button class="active" onclick="showTab('main')">Главная</button>
  <button onclick="showTab('ld')">Личные дела</button>
  <button onclick="logout()">Выйти</button>
</div>

<div class="mil-content">
  <div class="section active" id="sec-main">
    <div class="welcome"><h2>Добро пожаловать</h2><p id="userInfo"></p></div>
  </div>
  <div class="section" id="sec-ld"><h2>Личные дела</h2></div>
</div>

<script>
const ADMIN_USER = 'Швец О.В.';
const ADMIN_PASS = 'Google200720';
let currentUser = null;

document.getElementById('loginForm').onsubmit = function(e){
  e.preventDefault();
  var user = document.getElementById('loginUsername').value.trim();
  var pass = document.getElementById('loginPassword').value;
  
  if(user === ADMIN_USER && pass === ADMIN_PASS){
    currentUser = {name: user, role: 'Модер'};
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('userInfo').textContent = 'Пользователь: '+user+' | Роль: '+currentUser.role;
    localStorage.setItem('user', JSON.stringify(currentUser));
  } else {
    var err = document.getElementById('authError');
    err.textContent = 'Неверный логин или пароль';
    err.style.display = 'block';
  }
};

function showTab(tab){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
}

function logout(){
  localStorage.removeItem('user');
  location.reload();
}

// Проверка сохраненной сессии
var saved = localStorage.getItem('user');
if(saved){
  currentUser = JSON.parse(saved);
  document.getElementById('authOverlay').style.display = 'none';
  document.getElementById('userInfo').textContent = 'Пользователь: '+currentUser.name+' | Роль: '+currentUser.role;
}
</script>

</body>
</html>
